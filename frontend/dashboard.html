<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proof-of-Engagement | Dashboard</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #111827;
        --muted: #4b5563;
        --line: #dbe2ea;
        --accent: #0f766e;
      }

      body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: #ffffff;
      }
      .topbar {
        max-width: 1020px;
        margin: 0 auto;
        padding: 0.95rem 1.1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }
      .brand {
        font-size: 1.1rem;
        font-weight: 700;
      }
      .brand span {
        color: var(--accent);
      }
      nav {
        display: flex;
        gap: 0.85rem;
      }
      nav a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.92rem;
        font-weight: 600;
      }
      nav a:hover {
        color: var(--accent);
      }

      main {
        max-width: 1020px;
        margin: 0 auto;
        padding: 1.4rem 1.1rem 3rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      /* toolbar */
      .toolbar {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.85rem 1rem;
        display: flex;
        align-items: flex-end;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .toolbar .field {
        flex: 1 1 280px;
      }
      .toolbar label {
        display: block;
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 0.28rem;
      }
      #wallet-status {
        width: 100%;
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 0.1rem;
      }

      input {
        width: 100%;
        background: #ffffff;
        border: 1px solid var(--line);
        border-radius: 7px;
        color: var(--text);
        padding: 0.5rem 0.7rem;
        font-size: 0.9rem;
        outline: none;
      }
      input:focus {
        border-color: var(--accent);
      }

      button {
        cursor: pointer;
        border: none;
        border-radius: 7px;
        padding: 0.52rem 1.1rem;
        font-size: 0.88rem;
        font-weight: 700;
        transition: opacity 0.15s;
        white-space: nowrap;
      }
      button:hover {
        opacity: 0.88;
      }
      button.primary {
        background: var(--accent);
        color: #fff;
      }
      button.secondary {
        background: #e9eef5;
        color: #0f172a;
      }

      /* section header */
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .section-title {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }
      #campaign-count {
        font-size: 0.78rem;
        color: var(--muted);
      }

      /* campaign rows */
      .campaign-row {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        transition: border-color 0.12s;
      }
      .campaign-row:hover {
        border-color: #9ca3af;
      }
      .campaign-row.open {
        border-color: var(--accent);
      }

      .campaign-summary {
        display: flex;
        align-items: center;
        gap: 0.9rem;
        padding: 0.72rem 1rem;
        cursor: pointer;
        user-select: none;
        flex-wrap: wrap;
      }

      .c-id {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--accent);
        min-width: 100px;
      }
      .c-creator {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.74rem;
        color: var(--muted);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }
      .c-deadline {
        font-size: 0.76rem;
        color: var(--muted);
        white-space: nowrap;
      }

      .status-badge {
        display: inline-block;
        border-radius: 99px;
        padding: 0.17rem 0.68rem;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .badge-open {
        background: #e0f2fe;
        color: #0369a1;
      }
      .badge-settled_success {
        background: #dcfce7;
        color: #166534;
      }
      .badge-settled_refund {
        background: #fee2e2;
        color: #991b1b;
      }

      .chevron {
        font-size: 0.72rem;
        color: var(--muted);
        transition: transform 0.15s;
        flex-shrink: 0;
      }
      .campaign-row.open .chevron {
        transform: rotate(90deg);
      }

      /* detail panel */
      .campaign-detail {
        display: none;
        border-top: 1px solid var(--line);
        padding: 1rem;
        background: #fafcff;
      }
      .campaign-row.open .campaign-detail {
        display: block;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 0.35rem 1.5rem;
        margin-bottom: 0.9rem;
      }

      .field-row {
        display: flex;
        justify-content: space-between;
        gap: 0.5rem;
        padding: 0.28rem 0;
        border-bottom: 1px solid #eef2f7;
        font-size: 0.82rem;
      }
      .field-row:last-child {
        border-bottom: none;
      }
      .field-label {
        color: var(--muted);
        flex-shrink: 0;
      }
      .field-val {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        word-break: break-all;
        text-align: right;
      }

      .scores-title {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.45rem;
      }

      .score-row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.36rem 0.6rem;
        background: #f1f5f9;
        border-radius: 6px;
        margin-top: 0.28rem;
      }
      .score-validator {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.72rem;
        color: var(--muted);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }
      .score-bar-wrap {
        width: 90px;
        height: 7px;
        background: #e5e7eb;
        border-radius: 4px;
        flex-shrink: 0;
      }
      .score-bar {
        height: 7px;
        background: var(--accent);
        border-radius: 4px;
      }
      .score-val {
        font-size: 0.78rem;
        font-weight: 700;
        min-width: 46px;
        text-align: right;
      }

      /* actions inside detail */
      .detail-actions {
        margin-top: 0.85rem;
        padding-top: 0.7rem;
        border-top: 1px solid var(--line);
        display: flex;
        gap: 0.55rem;
        flex-wrap: wrap;
        align-items: center;
      }

      .settle-extra {
        margin-top: 0.7rem;
        display: none;
        flex-direction: column;
        gap: 0.45rem;
        width: 100%;
      }
      .settle-extra.visible {
        display: flex;
      }
      .settle-extra label {
        font-size: 0.78rem;
        color: var(--muted);
        margin-bottom: 0.18rem;
        display: block;
      }
      .settle-extra input,
      .settle-extra textarea {
        width: 100%;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        padding: 0.42rem 0.6rem;
        font-size: 0.8rem;
        outline: none;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .settle-extra textarea {
        resize: vertical;
        min-height: 52px;
      }
      .settle-extra input:focus,
      .settle-extra textarea:focus {
        border-color: var(--accent);
      }

      .action-log {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.77rem;
        background: #f8fafc;
        border-radius: 6px;
        border: 1px solid #e2e8f0;
        padding: 0.55rem 0.7rem;
        color: #166534;
        white-space: pre-wrap;
        width: 100%;
        margin-top: 0.35rem;
      }
      .action-log.error {
        color: #b91c1c;
      }
      .action-log.info {
        color: var(--muted);
      }

      /* create card */
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 1rem;
      }
      .card h2 {
        font-size: 0.82rem;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.9rem;
      }

      .form-row {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .form-row > * {
        flex: 1 1 200px;
      }
      .form-label {
        display: block;
        font-size: 0.81rem;
        color: var(--muted);
        margin-top: 0.65rem;
        margin-bottom: 0.23rem;
      }
      textarea.form-textarea {
        width: 100%;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 7px;
        color: var(--text);
        padding: 0.48rem 0.65rem;
        font-size: 0.88rem;
        outline: none;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        resize: vertical;
        min-height: 60px;
      }
      textarea.form-textarea:focus {
        border-color: var(--accent);
      }

      .cc-log {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.78rem;
        background: #f8fafc;
        border-radius: 6px;
        border: 1px solid #e2e8f0;
        padding: 0.65rem;
        min-height: 2.2rem;
        white-space: pre-wrap;
        color: var(--muted);
        margin-top: 0.75rem;
      }
      .cc-log.ok {
        color: #166534;
      }
      .cc-log.error {
        color: #b91c1c;
      }

      /* empty / loading */
      .empty-state {
        text-align: center;
        padding: 2.5rem 1rem;
        color: var(--muted);
        font-size: 0.9rem;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
      }

      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #d1d5db;
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 0.45rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="topbar">
        <div class="brand">Proof-of-<span>Engagement</span></div>
        <nav>
          <a href="/">Home</a>
          <a href="/docs.html">Docs</a>
          <a href="/dashboard.html">Dashboard</a>
        </nav>
      </div>
    </header>

    <main>
      <!-- Connection toolbar -->
      <div class="toolbar">
        <div class="field">
          <label for="rpc-url">RPC Endpoint</label>
          <input id="rpc-url" value="http://127.0.0.1:8899" />
        </div>
        <button class="primary" onclick="connectAndLoad()">
          Connect &amp; Load
        </button>
        <button
          class="secondary"
          id="refresh-btn"
          onclick="loadCampaigns()"
          style="display: none"
        >
          &#8635; Refresh
        </button>
        <div id="wallet-status">Not connected.</div>
      </div>

      <!-- Campaign list -->
      <div
        id="campaigns-section"
        style="display: flex; flex-direction: column; gap: 0.55rem"
      >
        <div class="section-header">
          <span class="section-title">All Campaigns</span>
          <span id="campaign-count"></span>
        </div>
        <div id="campaign-list">
          <div class="empty-state">
            Connect to an RPC endpoint to browse campaigns.
          </div>
        </div>
      </div>

      <!-- Create campaign -->
      <div class="card">
        <h2>Create Campaign</h2>
        <div class="form-row">
          <div>
            <label class="form-label" for="cc-id">Campaign ID (u64)</label>
            <input id="cc-id" type="number" value="1" />
          </div>
          <div>
            <label class="form-label" for="cc-amount"
              >Amount (raw token units)</label
            >
            <input id="cc-amount" type="number" value="1000000" />
          </div>
        </div>
        <div class="form-row">
          <div>
            <label class="form-label" for="cc-threshold"
              >Threshold BPS (0-10000)</label
            >
            <input id="cc-threshold" type="number" value="5000" />
          </div>
          <div>
            <label class="form-label" for="cc-deadline"
              >Deadline (Unix timestamp)</label
            >
            <input id="cc-deadline" type="number" />
          </div>
        </div>
        <label class="form-label" for="cc-executor">Executor Pubkey</label>
        <input id="cc-executor" placeholder="Base58 executor public key" />
        <label class="form-label" for="cc-validators"
          >Validators (one pubkey per line)</label
        >
        <textarea
          id="cc-validators"
          class="form-textarea"
          placeholder="Validator pubkeys, one per line"
        ></textarea>
        <label class="form-label" for="cc-taskref"
          >Task Ref (hex, 64 chars)</label
        >
        <input id="cc-taskref" placeholder="64 hex chars" />
        <button
          class="primary"
          style="margin-top: 0.9rem"
          onclick="createCampaign()"
        >
          Create Campaign
        </button>
        <div id="cc-log" class="cc-log">Awaiting input…</div>
      </div>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
